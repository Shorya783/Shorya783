<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c9ff"/>
      <stop offset="50%" stop-color="#92fe9d"/>
      <stop offset="100%" stop-color="#00c9ff"/>
    </linearGradient>
    <linearGradient id="nameGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c9ff"/>
      <stop offset="100%" stop-color="#92fe9d"/>
    </linearGradient>
  </defs>

  <!-- Outer border -->
  <rect x="4" y="4" width="892" height="212" rx="20" fill="url(#bgGradient)" stroke="url(#borderGradient)" stroke-width="4"/>

  <!-- Inner subtle border -->
  <rect x="14" y="14" width="872" height="192" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Decorative corner accents -->
  <circle cx="40" cy="40" r="3" fill="#92fe9d" opacity="0.8"/>
  <circle cx="860" cy="40" r="3" fill="#00c9ff" opacity="0.8"/>
  <circle cx="40" cy="180" r="3" fill="#00c9ff" opacity="0.8"/>
  <circle cx="860" cy="180" r="3" fill="#92fe9d" opacity="0.8"/>

  <!-- Name -->
  <text x="450" y="95" font-family="'Segoe UI', Verdana, sans-serif" font-size="46" font-weight="700" fill="url(#nameGradient)" text-anchor="middle">
    Shourya Pathak
  </text>

  <!-- Divider line -->
  <line x1="300" y1="120" x2="600" y2="120" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Skills -->
  <text x="450" y="155" font-family="'Segoe UI', Verdana, sans-serif" font-size="24" font-weight="500" fill="#e0e0e0" text-anchor="middle">
    AI/ML Engineer  |  RAG  |  LLMs
  </text>

  <!-- Subtitle tagline -->
  <text x="450" y="185" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" fill="#9aa0c9" text-anchor="middle" letter-spacing="2">
    BUILDING INTELLIGENT SYSTEMS
  </text>
</svg>
