<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260">
  <defs>
    <clipPath id="rounded"><rect x="1" y="1" width="1198" height="258" rx="18" ry="18"/></clipPath>

    <!-- Professional deep blue / indigo gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1023"/>
      <stop offset="45%" stop-color="#151a3d"/>
      <stop offset="100%" stop-color="#1b2a52"/>
    </linearGradient>

    <radialGradient id="auroraBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7d6ff"/>
    </linearGradient>

    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <pattern id="dotGrid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#8fa3ff" opacity="0.16"/>
    </pattern>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="textGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boltGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <radialGradient id="impactGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#7dd3fc" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="typeClip">
      <rect x="280" y="140" width="0" height="30">
        <animate attributeName="width"
          calcMode="discrete"
          keyTimes="0.0;0.0084;0.01681;0.02521;0.03361;0.04202;0.05042;0.05882;0.06723;0.07563;0.08403;0.09244;0.10084;0.10924;0.11765;0.12605;0.13445;0.14286;0.15126;0.15966;0.16807;0.17647;0.18487;0.19328;0.20168;0.21008;0.21849;0.22689;0.23529;0.2437;0.2521;0.2605;0.26891;0.27731;0.28571;0.29412;0.30252;0.31092;0.31933;0.32773;0.33613;0.34454;0.35294;0.36134;0.36975;0.37815;0.38655;0.39496;0.40336;0.41176;0.42017;0.42857;0.43697;0.44538;0.45378;0.46218;0.69748;0.69749;0.70145;0.70542;0.7094;0.71337;0.71734;0.72131;0.72529;0.72926;0.73323;0.7372;0.74118;0.74515;0.74912;0.75309;0.75707;0.76104;0.76501;0.76898;0.77296;0.77693;0.7809;0.78487;0.78885;0.79282;0.79679;0.80076;0.80474;0.80871;0.81268;0.81665;0.82063;0.8246;0.82857;0.83254;0.83652;0.84049;0.84446;0.84843;0.85241;0.85638;0.86035;0.86432;0.8683;0.87227;0.87624;0.88021;0.88419;0.88816;0.89213;0.8961;0.90008;0.90405;0.90802;0.91199;0.91597;1.0"
          values="0.0;11.64;23.27;34.91;46.55;58.18;69.82;81.45;93.09;104.73;116.36;128.0;139.64;151.27;162.91;174.55;186.18;197.82;209.45;221.09;232.73;244.36;256.0;267.64;279.27;290.91;302.55;314.18;325.82;337.45;349.09;360.73;372.36;384.0;395.64;407.27;418.91;430.55;442.18;453.82;465.45;477.09;488.73;500.36;512.0;523.64;535.27;546.91;558.55;570.18;581.82;593.45;605.09;616.73;628.36;640.0;640.0;640.0;628.36;616.73;605.09;593.45;581.82;570.18;558.55;546.91;535.27;523.64;512.0;500.36;488.73;477.09;465.45;453.82;442.18;430.55;418.91;407.27;395.64;384.0;372.36;360.73;349.09;337.45;325.82;314.18;302.55;290.91;279.27;267.64;256.0;244.36;232.73;221.09;209.45;197.82;186.18;174.55;162.91;151.27;139.64;128.0;116.36;104.73;93.09;81.45;69.82;58.18;46.55;34.91;23.27;11.64;0.0;0.0"
          dur="5.95s" begin="2.6s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- base gradient -->
    <rect x="0" y="0" width="1200" height="260" fill="url(#bgGrad)"/>

    <!-- soft drifting aurora glows for depth, professional and subtle -->
    <circle cx="180" cy="60" r="160" fill="url(#auroraBlue)" filter="url(#softBlur)">
      <animate attributeName="cx" values="180;260;180" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;100;60" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1020" cy="190" r="180" fill="url(#auroraViolet)" filter="url(#softBlur)">
      <animate attributeName="cx" values="1020;930;1020" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="190;150;190" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="230" r="140" fill="url(#auroraBlue)" filter="url(#softBlur)" opacity="0.6">
      <animate attributeName="cx" values="620;700;620" dur="18s" repeatCount="indefinite"/>
    </circle>

    <!-- faint professional dot grid -->
    <rect x="0" y="0" width="1200" height="260" fill="url(#dotGrid)"/>

    <!-- gentle floating particles -->
    <circle cx="120" cy="200" r="1.8" fill="#9db4ff" opacity="0.3">
      <animate attributeName="cy" values="210;190;210" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="60" r="1.6" fill="#9db4ff" opacity="0.3">
      <animate attributeName="cy" values="70;50;70" dur="7.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="210" r="1.4" fill="#9db4ff" opacity="0.3">
      <animate attributeName="cy" values="215;195;215" dur="5.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="45" r="1.7" fill="#9db4ff" opacity="0.3">
      <animate attributeName="cy" values="50;30;50" dur="6.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0.42;0.12" dur="5.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="770" cy="40" r="1.5" fill="#9db4ff" opacity="0.3">
      <animate attributeName="cy" values="45;25;45" dur="7.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0.38;0.12" dur="4.4s" repeatCount="indefinite"/>
    </circle>

    <!-- ===== LIGHTNING INTRO (plays once, then heading appears) ===== -->
    <rect x="0" y="0" width="1200" height="260" fill="#eaffff" opacity="0">
      <animate attributeName="opacity"
        values="0;0.75;0.1;0.6;0;0.85;0;0"
        keyTimes="0;0.09;0.18;0.27;0.36;0.5;0.64;1"
        dur="1.1s" begin="0.1s" fill="freeze" repeatCount="1"/>
    </rect>

    <path d="M 600.0,-10.0 L 602.3,12.9 L 604.5,35.7 L 603.5,58.6 L 607.0,81.4 L 593.7,104.3 L 598.8,127.1 L 575.0,150.0"
          fill="none" stroke="#eaffff" stroke-width="3.6" stroke-linejoin="round" stroke-linecap="round"
          filter="url(#boltGlow)" opacity="0">
      <animate attributeName="opacity"
        values="0;1;0.15;0.85;0;1;0;0"
        keyTimes="0;0.09;0.18;0.27;0.36;0.5;0.64;1"
        dur="1.1s" begin="0.1s" fill="freeze" repeatCount="1"/>
    </path>
    <path d="M 603.5,58.6 L 616.9,76.9 L 655.8,95.2 L 683.5,113.6"
          fill="none" stroke="#bff7ff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"
          filter="url(#boltGlow)" opacity="0">
      <animate attributeName="opacity"
        values="0;0.85;0.1;0.7;0;0.8;0;0"
        keyTimes="0;0.09;0.18;0.27;0.36;0.5;0.64;1"
        dur="1.1s" begin="0.15s" fill="freeze" repeatCount="1"/>
    </path>

    <circle cx="575.0" cy="150.0" r="8" fill="url(#impactGlow)" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0.4;0" keyTimes="0;0.3;0.5;0.75;1"
               dur="1.1s" begin="0.35s" fill="freeze" repeatCount="1"/>
      <animate attributeName="r" values="8;8;130;150" keyTimes="0;0.3;0.6;1"
               dur="1.1s" begin="0.35s" fill="freeze" repeatCount="1"/>
    </circle>

    <!-- ===== HEADING ===== -->
    <g transform-origin="600px 100px">
      <text x="600" y="105" font-size="48" font-weight="800" text-anchor="middle"
            fill="url(#headGrad)" filter="url(#textGlow)"
            font-family="Segoe UI, Verdana, Arial, sans-serif" opacity="0">
        Who Am I
        <animate attributeName="opacity" values="0;1" dur="0.9s" begin="1.5s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate"
          values="0,22;0,0" dur="0.9s" begin="1.5s" fill="freeze"/>
      </text>

      <!-- animated underline accent -->
      <rect x="600" y="122" width="0" height="4" rx="2" fill="url(#barGrad)">
        <animate attributeName="width" values="0;190" dur="0.7s" begin="2.35s" fill="freeze"/>
        <animate attributeName="x" values="600;505" dur="0.7s" begin="2.35s" fill="freeze"/>
      </rect>
    </g>

    <!-- ===== TYPEWRITER SUBTITLE ===== -->
    <text x="280" y="158" font-size="19" font-weight="600" text-anchor="start"
          fill="#dbe4ff" font-family="Consolas, 'Courier New', monospace"
          textLength="640" lengthAdjust="spacingAndGlyphs"
          clip-path="url(#typeClip)">
      AI/ML Engineer crafting intelligent, real-world systems
    </text>

    <!-- blinking cursor that tracks the typed text -->
    <rect y="140" width="2.6" height="21" fill="#7dd3fc" opacity="0">
      <animate attributeName="x"
        calcMode="discrete"
        keyTimes="0.0;0.0084;0.01681;0.02521;0.03361;0.04202;0.05042;0.05882;0.06723;0.07563;0.08403;0.09244;0.10084;0.10924;0.11765;0.12605;0.13445;0.14286;0.15126;0.15966;0.16807;0.17647;0.18487;0.19328;0.20168;0.21008;0.21849;0.22689;0.23529;0.2437;0.2521;0.2605;0.26891;0.27731;0.28571;0.29412;0.30252;0.31092;0.31933;0.32773;0.33613;0.34454;0.35294;0.36134;0.36975;0.37815;0.38655;0.39496;0.40336;0.41176;0.42017;0.42857;0.43697;0.44538;0.45378;0.46218;0.69748;0.69749;0.70145;0.70542;0.7094;0.71337;0.71734;0.72131;0.72529;0.72926;0.73323;0.7372;0.74118;0.74515;0.74912;0.75309;0.75707;0.76104;0.76501;0.76898;0.77296;0.77693;0.7809;0.78487;0.78885;0.79282;0.79679;0.80076;0.80474;0.80871;0.81268;0.81665;0.82063;0.8246;0.82857;0.83254;0.83652;0.84049;0.84446;0.84843;0.85241;0.85638;0.86035;0.86432;0.8683;0.87227;0.87624;0.88021;0.88419;0.88816;0.89213;0.8961;0.90008;0.90405;0.90802;0.91199;0.91597;1.0"
        values="280.0;291.64;303.27;314.91;326.55;338.18;349.82;361.45;373.09;384.73;396.36;408.0;419.64;431.27;442.91;454.55;466.18;477.82;489.45;501.09;512.73;524.36;536.0;547.64;559.27;570.91;582.55;594.18;605.82;617.45;629.09;640.73;652.36;664.0;675.64;687.27;698.91;710.55;722.18;733.82;745.45;757.09;768.73;780.36;792.0;803.64;815.27;826.91;838.55;850.18;861.82;873.45;885.09;896.73;908.36;920.0;920.0;920.0;908.36;896.73;885.09;873.45;861.82;850.18;838.55;826.91;815.27;803.64;792.0;780.36;768.73;757.09;745.45;733.82;722.18;710.55;698.91;687.27;675.64;664.0;652.36;640.73;629.09;617.45;605.82;594.18;582.55;570.91;559.27;547.64;536.0;524.36;512.73;501.09;489.45;477.82;466.18;454.55;442.91;431.27;419.64;408.0;396.36;384.73;373.09;361.45;349.82;338.18;326.55;314.91;303.27;291.64;280.0;280.0"
        dur="5.95s" begin="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.01;0.02" dur="5.95s" begin="2.6s" fill="freeze" repeatCount="1"/>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.7;0.75;1" dur="0.9s" begin="3.5s" repeatCount="indefinite"/>
    </rect>

    <!-- subtle rounded border -->
    <rect x="2" y="2" width="1196" height="256" rx="16" ry="16" fill="none" stroke="#4f6bff" stroke-opacity="0.25" stroke-width="2"/>
  </g>
</svg>
